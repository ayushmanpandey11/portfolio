<!DOCTYPE html>
<html>
<head>
  <title>To-Do App</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 70%;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      cursor: pointer;
      background: #38bdf8;
      border: none;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #334155;
      margin: 5px 0;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .delete {
      background: red;
      border: none;
      color: white;
      cursor: pointer;
      padding: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>To-Do App</h2>

  <input type="text" id="task" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>
</div>

<script>
function addTask() {
  let task = document.getElementById("task").value;

  if (task === "") return;

  let li = document.createElement("li");
  li.innerText = task;

  let btn = document.createElement("button");
  btn.innerText = "X";
  btn.className = "delete";

  btn.onclick = function () {
    li.remove();
  };

  li.appendChild(btn);
  document.getElementById("list").appendChild(li);

  document.getElementById("task").value = "";
}
</script>

</body>
</html>
