<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>

  <style>
    body {
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .calculator {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 20px;
      margin-bottom: 15px;
      border: none;
      outline: none;
      text-align: right;
    }

    button {
      width: 60px;
      height: 60px;
      margin: 5px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn {
      background: #334155;
      color: white;
    }

    .equal {
      background: #38bdf8;
      color: black;
    }
  </style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <br>

  <button class="btn" onclick="add('7')">7</button>
  <button class="btn" onclick="add('8')">8</button>
  <button class="btn" onclick="add('9')">9</button>
  <button class="btn" onclick="add('/')">/</button>

  <br>

  <button class="btn" onclick="add('4')">4</button>
  <button class="btn" onclick="add('5')">5</button>
  <button class="btn" onclick="add('6')">6</button>
  <button class="btn" onclick="add('*')">*</button>

  <br>

  <button class="btn" onclick="add('1')">1</button>
  <button class="btn" onclick="add('2')">2</button>
  <button class="btn" onclick="add('3')">3</button>
  <button class="btn" onclick="add('-')">-</button>

  <br>

  <button class="btn" onclick="add('0')">0</button>
  <button class="btn" onclick="clearDisplay()">C</button>
  <button class="equal" onclick="calculate()">=</button>
  <button class="btn" onclick="add('+')">+</button>
</div>

<script>
function add(value) {
  document.getElementById("display").value += value;
}

function calculate() {
  let result = document.getElementById("display").value;
  document.getElementById("display").value = eval(result);
}

function clearDisplay() {
  document.getElementById("display").value = "";
}
</script>

</body>
</html>
